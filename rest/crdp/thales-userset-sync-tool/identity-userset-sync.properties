# Common CipherTrust settings
cm.host=ciphertrust.example.com
cm.username=admin
cm.password=changeme
cm.debug=false

# CHECK lists existing user sets plus the planned target user sets.
# SYNC creates missing user sets and reconciles membership exactly to the source files.
# ROLLBACK restores one userset from a saved snapshot file.
sync.mode=CHECK

# Source mode:
# FILE reads exported files.
# LIVE connects directly to LDAP / AD / Entra.
source.mode=FILE

# Supported values: LDAP, AD, ENTRA, OKTA, SCIM
source.type=LDAP

# Optional report output file. You can also just redirect stdout.
output.file=E:/eclipse-workspace/thales-userset-sync-tool/identity-userset-sync-report.txt

# Optional audit output directory. If set, the tool writes current/desired/add/remove snapshots per userset.
audit.dir=E:/eclipse-workspace/thales-userset-sync-tool/audit/identity-userset-sync

# Safety guards for accidental large removals.
# Set sync.maxRemovals=-1 to disable the absolute threshold.
sync.maxRemovals=100
sync.maxRemovalPercent=50

# Rollback mode settings:
# If rollback.snapshot.file is not set, the tool will use:
# audit.dir/<safe-userset-name>/<rollback.snapshot.phase>-<rollback.snapshot.type>.txt
rollback.userSetName=dc=example,dc=com-HR
rollback.snapshot.phase=presync
rollback.snapshot.type=current
# rollback.snapshot.file=E:/eclipse-workspace/thales-userset-sync-tool/audit/identity-userset-sync/dc_example_dc_com-HR/presync-current.txt

# LDAP mode:
# One file per OU. Each file should contain one user per line for the direct OU scope you want to sync.
# The generated user set name is ldap.baseDn + "-" + OU.
ldap.baseDn=dc=example,dc=com
ldap.ous=HR,Finance
ldap.file.HR=E:/data/ldap/hr-users.txt
ldap.file.Finance=E:/data/ldap/finance-users.txt

# LDAP / AD live mode:
# For direct OU-only sync, keep ldap.subtree=false.
# Transport security values: NONE, SSL, STARTTLS
ldap.url=ldap://ldap.example.com:389
ldap.bindDn=cn=syncuser,ou=service,dc=example,dc=com
ldap.password=changeme
ldap.transportSecurity=NONE
ldap.ouRdnAttribute=ou
ldap.searchFilter=(objectClass=person)
ldap.userIdAttribute=userPrincipalName
ldap.subtree=false
ldap.connectTimeoutMillis=10000
ldap.readTimeoutMillis=30000
ldap.excludeDisabledUsers=true
ldap.disabledStatusAttribute=userAccountControl
# Optional per-OU override:
# ldap.searchBase.HR=ou=HR,dc=example,dc=com

# ENTRA mode:
# The generated user set name is entra.prefix.<namespace> + "-" + <group>.
entra.namespaces=HR,FIN
entra.prefix.HR=hrdepartment
entra.groups.HR=alloweduser,maskeduser,plaintextusers
entra.file.HR.alloweduser=E:/data/entra/hr-alloweduser.txt
entra.file.HR.maskeduser=E:/data/entra/hr-maskeduser.txt
entra.file.HR.plaintextusers=E:/data/entra/hr-plaintextusers.txt

entra.prefix.FIN=findepartment
entra.groups.FIN=alloweduser,auditors,other
entra.file.FIN.alloweduser=E:/data/entra/fin-alloweduser.txt
entra.file.FIN.auditors=E:/data/entra/fin-auditors.txt
entra.file.FIN.other=E:/data/entra/fin-other.txt

# Entra live mode:
# Recommended to use application permissions and group IDs.
entra.tenantId=00000000-0000-0000-0000-000000000000
entra.clientId=00000000-0000-0000-0000-000000000000
entra.clientSecret=changeme
entra.userIdAttribute=userPrincipalName
entra.graphBaseUrl=https://graph.microsoft.com/v1.0
entra.groupId.HR.alloweduser=00000000-0000-0000-0000-000000000001
entra.groupId.HR.maskeduser=00000000-0000-0000-0000-000000000002
entra.groupId.HR.plaintextusers=00000000-0000-0000-0000-000000000003
entra.groupId.FIN.alloweduser=00000000-0000-0000-0000-000000000004
entra.groupId.FIN.auditors=00000000-0000-0000-0000-000000000005
entra.groupId.FIN.other=00000000-0000-0000-0000-000000000006

# Okta mode:
# The generated user set name is okta.prefix.<namespace> + "-" + <group>.
okta.namespaces=HR
okta.prefix.HR=hrdepartment
okta.groups.HR=alloweduser,maskeduser
okta.file.HR.alloweduser=E:/data/okta/hr-alloweduser.txt
okta.file.HR.maskeduser=E:/data/okta/hr-maskeduser.txt

# Okta live mode:
okta.baseUrl=https://example.okta.com
okta.apiToken=changeme
okta.userIdAttribute=profile.login
okta.activeUsersOnly=true
okta.pageLimit=200
okta.groupId.HR.alloweduser=00gexampleallowed001
okta.groupId.HR.maskeduser=00gexamplemasked002

# SCIM mode:
# The generated user set name is scim.prefix.<namespace> + "-" + <group>.
scim.namespaces=HR
scim.prefix.HR=hrdepartment
scim.groups.HR=alloweduser,maskeduser
scim.file.HR.alloweduser=E:/data/scim/hr-alloweduser.txt
scim.file.HR.maskeduser=E:/data/scim/hr-maskeduser.txt

# SCIM live mode:
scim.baseUrl=https://example.com/scim/v2
scim.bearerToken=changeme
scim.userIdAttribute=display
scim.pageSize=100
scim.groupId.HR.alloweduser=group-allowed-001
scim.groupId.HR.maskeduser=group-masked-002
# If your SCIM provider works better with display names than IDs:
# scim.groupDisplayName.HR.alloweduser=alloweduser
