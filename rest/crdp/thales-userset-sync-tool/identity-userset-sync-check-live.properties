# Safe starter profile for live LDAP / AD validation.
# This file is intentionally set to CHECK so it will not modify CipherTrust.

cm.host=ciphertrust.example.com
cm.username=admin
cm.password=changeme
cm.debug=false

sync.mode=CHECK
source.mode=LIVE
source.type=LDAP

output.file=E:/eclipse-workspace/thales-userset-sync-tool/identity-userset-sync-check-live-report.txt
audit.dir=E:/eclipse-workspace/thales-userset-sync-tool/audit/identity-userset-sync-check-live

sync.maxRemovals=100
sync.maxRemovalPercent=50

ldap.baseDn=dc=example,dc=com
ldap.ous=HR

# Use one of:
# ldap.transportSecurity=NONE
# ldap.transportSecurity=SSL
# ldap.transportSecurity=STARTTLS
ldap.transportSecurity=SSL

# For SSL, the URL is usually ldaps://host:636
# For STARTTLS or NONE, it is often ldap://host:389
ldap.url=ldaps://ldap.example.com:636
ldap.bindDn=cn=syncuser,ou=service,dc=example,dc=com
ldap.password=changeme

ldap.ouRdnAttribute=ou
ldap.searchFilter=(objectClass=person)
ldap.userIdAttribute=userPrincipalName
ldap.subtree=false
ldap.connectTimeoutMillis=10000
ldap.readTimeoutMillis=30000

# AD safety option:
# When true, skips disabled AD accounts based on userAccountControl.
ldap.excludeDisabledUsers=true
ldap.disabledStatusAttribute=userAccountControl

# Optional per-OU override:
# ldap.searchBase.HR=ou=HR,dc=example,dc=com
