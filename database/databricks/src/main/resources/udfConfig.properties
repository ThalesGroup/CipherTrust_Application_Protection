# udfConfig.properties
# Current properties kept for backward compatibility.
CMUSER=sdfsdf
CMPWD=sdfsdf!
databricksuser=admin
returnciphertextforuserwithnokeyaccess=yes
CRDPIP=yourip
CRDPPORT=8090
keymetadatalocation=external
keymetadata=1001000
protection_profile=alpha-external
protection_profile_alpha_ext=alpha-external
protection_profile_alpha_int=plain-alpha-internal
protection_profile_nbr_int=plain-nbr-internal
protection_profile_nbr_ext=plain-nbr-ext
BATCHSIZE=20
CRDPUSER=admin

# New properties.
# BATCH_SIZE controls how many values are sent in each v1 protectbulk/revealbulk request
# for a single resolved column/profile. Mixed-profile columns from the same row must be
# sent in separate bulk calls.
BATCH_SIZE=1000
DEFAULTREVEALUSER=admin
DEFAULTMETADATA=1001000
# DEFAULTMETADATA is used as the fallback external_version for external policies.
DEFAULTMODE=external
BADDATATAG=999999999
REVEAL_CACHE_ENABLED=false
REVEAL_CACHE_MAX_SIZE=10000

# Default policy fallbacks when a column does not have an explicit profile mapping.
DEFAULTINTERNALCHARPOLICY=char-internal
DEFAULTINTERNALNBRNBRPOLICY=nbr-nbr-internal
DEFAULTEXTERNALCHARPOLICY=char-external
DEFAULTEXTERNALNBRNBRPOLICY=test-nbr-nbr-external

# Column-to-profile mappings. Format: columnName|profileAlias
COLUMN_PROFILES=email|tag.char.internal,address|tag.char.internal,ssn|tag.nbr.internal,creditcard|tag.nbr.internal,creditcardcode|tag.nbr.internal,balance|tag.nbr.internal,amount|tag.nbr.internal,fee|tag.nbr.internal
#COLUMN_PROFILES=email|tag.char.external,ssn|tag.nbr.external,employee_id|tag.nbr.internal
#protect.object.my_catalog.my_schema.plaintext_protected_internal=email|tag.char.internal,address|tag.char.internal,ssn|tag.nbr.internal,creditcard|tag.nbr.internal,creditcardcode|tag.nbr.internal
# Optional per-column overrides.
# column.email.metadata=1001000
# column.email.revealUser=analytics_user
# column.employee_id.policyType=internal
column.ssn.metadata=1002000
column.creditcard.metadata=1002000
column.creditcardcode.metadata=1002000

# Profile aliases, similar to the JDBC plugin.
TAG.char.external=char-external
TAG.char.external.policyType=external
TAG.nbr.external=test-nbr-nbr-external
TAG.nbr.external.policyType=external
TAG.char.internal=char-internal
TAG.char.internal.policyType=internal
TAG.nbr.internal=nbr-nbr-internal
TAG.nbr.internal.policyType=internal
TAG.nbr.none=nbr-none
TAG.nbr.none.policyType=none
TAG.char.none=char-none
TAG.char.none.policyType=none

