<svg viewBox="0 0 1360 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Purview structured and unstructured protection flow">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f9fcff"/>
      <stop offset="100%" stop-color="#edf5fb"/>
    </linearGradient>
    <linearGradient id="navyGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#2e327a"/>
      <stop offset="100%" stop-color="#4957a7"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#35a9c1"/>
      <stop offset="100%" stop-color="#73d3d3"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#6c6fb1"/>
      <stop offset="100%" stop-color="#50538f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#8aa6c6" flood-opacity="0.22"/>
    </filter>
    <marker id="arrowMagenta" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c22c82"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3a8fd8"/>
    </marker>
    <style>
      .panel { fill: #ffffff; stroke: #305c9a; stroke-width: 3; filter: url(#shadow); }
      .soft { fill: url(#bg); stroke: #305c9a; stroke-width: 3; filter: url(#shadow); }
      .chip { fill: url(#navyGrad); }
      .chip-teal { fill: url(#tealGrad); }
      .chip-blue { fill: #4f8bd5; }
      .light-chip { fill: #ffffff; stroke: #c8d5e4; stroke-width: 2; }
      .smallbox { fill: #ffffff; stroke: #bfc7d4; stroke-width: 1.5; }
      .t1 { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #132238; }
      .t2 { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .t3 { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #305c9a; text-transform: uppercase; letter-spacing: 0.04em; }
      .t4 { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #58677d; }
      .t5 { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .t6 { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #31506e; }
      .t7 { font: 700 13px 'Segoe UI', Arial, sans-serif; fill: #3e4a59; }
      .t8 { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #41657a; }
    </style>
  </defs>

  <rect x="6" y="6" width="1348" height="788" rx="36" fill="url(#bg)" stroke="#d7e4f1" stroke-width="2"/>

  <rect x="52" y="128" width="190" height="490" rx="28" class="soft"/>
  <rect x="74" y="148" width="146" height="52" rx="14" class="chip"/>
  <text x="147" y="181" text-anchor="middle" class="t2">Purview</text>
  <text x="147" y="246" text-anchor="middle" class="t4">Register and scan</text>
  <text x="147" y="272" text-anchor="middle" class="t4">data sources</text>
  <text x="147" y="342" text-anchor="middle" class="t3">Classifies</text>
  <text x="147" y="375" text-anchor="middle" class="t8">Storage files</text>
  <text x="147" y="406" text-anchor="middle" class="t8">Folders</text>
  <text x="147" y="437" text-anchor="middle" class="t8">Tables</text>
  <text x="147" y="468" text-anchor="middle" class="t8">Columns</text>
  <rect x="76" y="500" width="142" height="90" rx="18" fill="#edf8fb" stroke="#b8dde4" stroke-width="2"/>
  <text x="147" y="533" text-anchor="middle" class="t6" font-weight="700">Output</text>
  <text x="147" y="552" text-anchor="middle" class="t8">Sensitive asset list</text>
  <text x="147" y="572" text-anchor="middle" class="t8">Qualified names</text>
  <text x="147" y="592" text-anchor="middle" class="t8">Classifications</text>

  <rect x="302" y="104" width="370" height="206" rx="28" class="soft"/>
  <rect x="326" y="128" width="164" height="38" rx="10" class="chip-teal"/>
  <text x="408" y="153" text-anchor="middle" class="t5">Storage Path</text>
  <text x="346" y="210" class="t1" style="font-size: 17px;">Blob Storage / ADLS Gen2</text>
  <text x="346" y="248" class="t4">Read the exact Purview-selected assets</text>
  <text x="346" y="275" class="t4">directly from Azure Storage.</text>
  <rect x="336" y="252" width="0" height="0" fill="none"/>
  <rect x="340" y="260" width="292" height="44" rx="12" class="light-chip"/>
  <text x="486" y="288" text-anchor="middle" class="t6">Stream source blob content into processor</text>

  <rect x="302" y="514" width="370" height="206" rx="28" class="soft"/>
  <rect x="326" y="538" width="164" height="38" rx="10" class="chip"/>
  <text x="408" y="563" text-anchor="middle" class="t5">SQL Path</text>
  <text x="346" y="620" class="t1" style="font-size: 17px;">Azure SQL Database / CSV</text>
  <text x="346" y="658" class="t4">Use Purview-sensitive columns or fields to</text>
  <text x="346" y="685" class="t4">protect only the right structured data.</text>
  <rect x="340" y="670" width="292" height="44" rx="12" class="light-chip"/>
  <text x="486" y="698" text-anchor="middle" class="t6">Read rows or records and protect classified fields</text>

  <rect x="752" y="132" width="244" height="180" rx="28" class="soft"/>
  <text x="874" y="180" text-anchor="middle" class="t1">Azure AI Language</text>
  <text x="874" y="214" text-anchor="middle" class="t4">PII detection API for</text>
  <text x="874" y="240" text-anchor="middle" class="t4">file-based content</text>
  <rect x="807" y="258" width="134" height="34" rx="10" class="chip-blue"/>
  <text x="874" y="280" text-anchor="middle" class="t5">PII Recognition</text>

  <rect x="752" y="354" width="248" height="192" rx="28" class="soft"/>
  <text x="876" y="402" text-anchor="middle" class="t1">Thales Protection</text>
  <text x="876" y="436" text-anchor="middle" class="t4">CipherTrust policies protect</text>
  <text x="876" y="462" text-anchor="middle" class="t4">sensitive values in unstructured data</text>
  <rect x="814" y="488" width="124" height="32" rx="10" class="chip"/>
  <text x="876" y="509" text-anchor="middle" class="t5">CADP / CRDP</text>

  <rect x="752" y="592" width="252" height="170" rx="28" class="soft"/>
  <text x="878" y="630" text-anchor="middle" class="t1">Thales Batch Data</text>
  <text x="878" y="658" text-anchor="middle" class="t1">Transformation Protection</text>
  <text x="878" y="700" text-anchor="middle" class="t4">Purpose-built protection for structured</text>
  <text x="878" y="730" text-anchor="middle" class="t4">database and bulk file transformations</text>

  <rect x="1044" y="112" width="256" height="154" rx="28" fill="url(#dbGrad)" filter="url(#shadow)"/>
  <text x="1172" y="168" text-anchor="middle" class="t2" style="font-size: 22px;">Protected Output</text>
  <text x="1172" y="214" text-anchor="middle" class="t5" style="font-weight: 500;">Governed storage assets</text>
  <text x="1172" y="244" text-anchor="middle" class="t5" style="font-weight: 500;">Protected SQL tables / files</text>

  <rect x="1008" y="320" width="318" height="322" rx="30" class="panel"/>
  <text x="1167" y="382" text-anchor="middle" class="t1" style="font-size: 20px;">Downstream AI and Data Use</text>
  <rect x="1071" y="430" width="192" height="38" rx="12" class="light-chip"/>
  <text x="1167" y="455" text-anchor="middle" class="t6">Vector DB / Search Index</text>
  <rect x="1071" y="482" width="192" height="38" rx="12" class="light-chip"/>
  <text x="1167" y="507" text-anchor="middle" class="t6">RAG and Prompt Pipelines</text>
  <rect x="1071" y="534" width="192" height="38" rx="12" class="light-chip"/>
  <text x="1167" y="559" text-anchor="middle" class="t6">Analytics and Data Sharing</text>
  <rect x="1071" y="586" width="192" height="38" rx="12" class="light-chip"/>
  <text x="1167" y="611" text-anchor="middle" class="t6">Fine Tuning / ML Prep</text>

  <rect x="348" y="340" width="278" height="88" rx="20" fill="#edf8fb" stroke="#b8dde4" stroke-width="2" filter="url(#shadow)"/>
  <text x="487" y="374" text-anchor="middle" class="t6" font-weight="700">CipherTrust Manager</text>
  <text x="487" y="398" text-anchor="middle" class="t8">Policy, key, and protection control plane</text>

  <line x1="242" y1="245" x2="302" y2="206" stroke="#c22c82" stroke-width="4" marker-end="url(#arrowMagenta)"/>
  <line x1="242" y1="532" x2="302" y2="617" stroke="#c22c82" stroke-width="4" marker-end="url(#arrowMagenta)"/>
  <line x1="672" y1="617" x2="752" y2="677" stroke="#c22c82" stroke-width="4" marker-end="url(#arrowMagenta)"/>
  <line x1="672" y1="210" x2="752" y2="222" stroke="#c22c82" stroke-width="4" marker-end="url(#arrowMagenta)"/>
  <line x1="874" y1="312" x2="876" y2="354" stroke="#c22c82" stroke-width="4" marker-end="url(#arrowMagenta)"/>
  <line x1="1000" y1="450" x2="1018" y2="450" stroke="#c22c82" stroke-width="4" marker-end="url(#arrowMagenta)"/>
  <line x1="1004" y1="690" x2="1086" y2="624" stroke="#3a8fd8" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <line x1="1172" y1="266" x2="1172" y2="320" stroke="#3a8fd8" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <line x1="752" y1="450" x2="626" y2="406" stroke="#3a8fd8" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <line x1="752" y1="656" x2="626" y2="406" stroke="#3a8fd8" stroke-width="4" marker-end="url(#arrowBlue)"/>
</svg>
