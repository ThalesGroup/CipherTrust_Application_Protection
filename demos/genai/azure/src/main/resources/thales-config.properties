# Purview integration settings
PURVIEW_ENDPOINT=https://your-account-name.purview.azure.com
PURVIEW_ACCESS_TOKEN=replace-with-a-short-lived-bearer-token
PURVIEW_DATASOURCE_NAME=yourPurviewDataSource
PURVIEW_SCAN_NAME=yourPurviewScan
PURVIEW_RUN_SCAN=false
PURVIEW_WAIT_FOR_SCAN=true
PURVIEW_SCAN_POLL_SECONDS=15
PURVIEW_SEARCH_LIMIT=100
PURVIEW_CLASSIFICATIONS=MICROSOFT.PERSONAL.NAME,MICROSOFT.PERSONAL.EMAIL,MICROSOFT.PERSONAL.PHONE_NUMBER
PURVIEW_FILE_ENTITY_HINTS=file,path,blob,adls,azure storage,azure blob,adls gen2
PURVIEW_SQL_COLUMN_ENTITY_HINTS=column,azure sql column,mssql column,sql column
PURVIEW_STORAGE_QUALIFIED_NAME_PREFIXES=
AZURE_STORAGE_CONNECTION_STRING=DefaultEndpointsProtocol=https;AccountName=youraccount;AccountKey=yourkey;EndpointSuffix=core.windows.net
PURVIEW_STORAGE_TARGET_CONTAINER=protected
PURVIEW_STORAGE_TARGET_PREFIX=thales-output

# Azure SQL settings used by ThalesAzurePurviewBatchProcessor when workload is sql or both
PURVIEW_SQL_JDBC_URL=jdbc:sqlserver://your-server.database.windows.net:1433;database=yourdb;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;
PURVIEW_SQL_USER=youruser
PURVIEW_SQL_PASSWORD=yourpassword
PURVIEW_SQL_SOURCE_TABLE=dbo.Customer
PURVIEW_SQL_TARGET_TABLE=dbo.CustomerProtected
PURVIEW_SQL_WHERE_CLAUSE=
PURVIEW_SQL_WRITE_MODE=replace
